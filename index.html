<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<title>Feedback App WBT</title>
<style>
  @font-face{font-family:'Inter';font-style:normal;font-weight:100 900;font-display:swap;src:url(assets/fonts/Inter.woff2) format('woff2');}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#000;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro","Inter","Helvetica Neue",Arial,sans-serif;}
  #vp{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  #stage{width:1133px;height:744px;position:relative;overflow:hidden;transform-origin:center center;
    background:linear-gradient(160deg,#dfe4ee 0%,#cfd6e6 55%,#c4ccdf 100%);}
  .card{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:392px;
    background:rgba(250,250,250,.72);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
    border-radius:30px;padding:44px 36px 32px;text-align:center;
    box-shadow:0 30px 80px rgba(0,0,0,.28),inset 0 0 0 .5px rgba(255,255,255,.6);}
  .lock{width:60px;height:60px;border-radius:16px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,#0a84ff,#0066d6);box-shadow:0 8px 22px rgba(10,132,255,.4)}
  .lock svg{width:28px;height:28px;fill:#fff}
  h1{font-size:22px;font-weight:600;letter-spacing:-0.4px;color:#1c1c1e}
  p.sub{font-size:14px;line-height:19px;color:rgba(60,60,67,.6);margin-top:6px}
  form{margin-top:24px}
  .field{display:flex;align-items:center;background:rgba(118,118,128,.12);border-radius:13px;padding:0 6px 0 14px;
    height:50px;transition:box-shadow .15s}
  .field.bad{box-shadow:0 0 0 2px #ff3b30}
  input{flex:1;border:none;background:transparent;outline:none;font-family:inherit;font-size:17px;
    letter-spacing:-0.3px;color:#1c1c1e;height:100%}
  input::placeholder{color:rgba(60,60,67,.45)}
  .go{width:38px;height:38px;border-radius:10px;border:none;background:#0a84ff;color:#fff;font-size:18px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .go:disabled{opacity:.4;cursor:default}
  .err{height:18px;margin-top:12px;font-size:13px;color:#ff3b30;opacity:0;transition:opacity .15s}
  .err.show{opacity:1}
  .foot{margin-top:18px;font-size:11px;color:rgba(60,60,67,.5);letter-spacing:.1px}
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}
    30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}
  .shake{animation:shake .5s}
</style>
</head>
<body>
<div id="vp"><div id="stage">
  <div class="card" id="card">
    <div class="lock"><svg viewBox="0 0 24 24"><path d="M12 1.7a4.6 4.6 0 0 0-4.6 4.6V9H6.2A2.2 2.2 0 0 0 4 11.2v8.6A2.2 2.2 0 0 0 6.2 22h11.6A2.2 2.2 0 0 0 20 19.8v-8.6A2.2 2.2 0 0 0 17.8 9h-1.2V6.3A4.6 4.6 0 0 0 12 1.7Zm0 1.8a2.8 2.8 0 0 1 2.8 2.8V9H9.2V6.3A2.8 2.8 0 0 1 12 3.5Zm0 9.1a1.7 1.7 0 0 1 .9 3.14V17.6a.9.9 0 0 1-1.8 0v-1.86A1.7 1.7 0 0 1 12 12.6Z"/></svg></div>
    <h1>Feedback App WBT</h1>
    <p class="sub">This is a private prototype.<br>Enter the password to continue.</p>
    <form id="f" autocomplete="off">
      <div class="field" id="field">
        <input id="pw" type="password" placeholder="Password" autocomplete="off" autofocus>
        <button class="go" id="go" type="submit" aria-label="Unlock">&#8594;</button>
      </div>
      <div class="err" id="err">Incorrect password</div>
    </form>
    <div class="foot">iPad mini prototype</div>
  </div>
</div></div>

var stage = document.getElementById('stage');
function fit(){ var sc = Math.min(innerWidth/1133, innerHeight/744); stage.style.transform = 'scale('+sc+')'; }
addEventListener('resize', fit); fit();

function b64d(s){ var bin = atob(s); var u = new Uint8Array(bin.length); for(var i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u; }

function decryptApp(pw){
  var salt = b64d(P.s), iv = b64d(P.i), ct = b64d(P.c);
  return crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey'])
    .then(function(bk){
      return crypto.subtle.deriveKey({name:'PBKDF2', salt:salt, iterations:P.n, hash:'SHA-256'},
        bk, {name:'AES-GCM', length:256}, false, ['decrypt']);
    })
    .then(function(key){ return crypto.subtle.decrypt({name:'AES-GCM', iv:iv}, key, ct); })
    .then(function(buf){ return new TextDecoder().decode(buf); });
}

function reveal(html){
  try { sessionStorage.setItem('fb_unlock', currentPw); } catch(e){}
  // Boot the decrypted app inside an iframe via srcdoc: it parses like a fresh
  // page load (scripts run, relative asset paths resolve to /dist/assets, and
  // localStorage stays on this origin). More reliable than document.write().
  document.documentElement.style.background = APP_BG;
  document.body.style.cssText = 'margin:0;background:'+APP_BG+';overflow:hidden';
  document.body.innerHTML = '';
  var f = document.createElement('iframe');
  f.title = 'Feedback App WBT';
  // Edge-to-edge: 100vw/100vh fills the standalone viewport at scale 1 (no side
  // letterbox). Note: on iPad the standalone viewport is ~32px shorter than the
  // physical screen — iOS reserves that bottom strip and the web view can't paint
  // there — so we instead keep app content clear of it (see the standalone CSS below).
  f.style.cssText = 'position:fixed;inset:0;width:100vw;height:100vh;border:0;margin:0;display:block;background:'+APP_BG;
  // When launched from the Home Screen (standalone), iOS draws its own status bar
  // and home indicator. Hide the app's drawn copies so they don't double up with
  // the real system chrome (and so the fake home-indicator pill doesn't read as a
  // black bar at the bottom). In a normal browser tab these stay visible, so the
  // designed chrome still shows for people viewing on the web.
  var standalone = (window.navigator.standalone === true) ||
    (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
  if (standalone) {
    f.addEventListener('load', function(){
      try {
        var d = f.contentDocument || f.contentWindow.document;
        var s = d.createElement('style');
        // Hide the app's drawn chrome (real system chrome shows instead), and shorten
        // the sidebar so its Settings row ends ABOVE the bottom strip iOS reserves for
        // the home indicator — otherwise the strip clips it. The strip is the app bg,
        // so it blends; the home indicator just floats over it.
        var sbH = Math.max(420, window.innerHeight - 40);
        s.textContent = '.statusbar,.homeindicator{display:none!important}' +
          '.sidebar{height:' + sbH + 'px!important}';
        d.head.appendChild(s);
      } catch(e){}
    });
  }
  f.setAttribute('srcdoc', html);
  document.body.appendChild(f);
}

var currentPw = '';
var form = document.getElementById('f');
var input = document.getElementById('pw');
var field = document.getElementById('field');
var err = document.getElementById('err');
var card = document.getElementById('card');
var go = document.getElementById('go');

function fail(){
  field.classList.add('bad'); err.classList.add('show'); card.classList.add('shake');
  setTimeout(function(){ card.classList.remove('shake'); }, 500);
  input.select(); go.disabled = false;
}

form.addEventListener('submit', function(e){
  e.preventDefault();
  currentPw = input.value;
  if(!currentPw){ return; }
  go.disabled = true; err.classList.remove('show'); field.classList.remove('bad');
  decryptApp(currentPw).then(reveal).catch(fail);
});

// Seamless re-entry within the same browser tab session.
(function(){
  var saved = null;
  try { saved = sessionStorage.getItem('fb_unlock'); } catch(e){}
  if(saved){ currentPw = saved; decryptApp(saved).then(reveal).catch(function(){ try{sessionStorage.removeItem('fb_unlock');}catch(e){} }); }
})();
</script>
